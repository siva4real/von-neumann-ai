ain;aspect-ratio:1;width:100%;height:100%}</style></head><body><div id="pylon-chat-bubble-frame"><div class="frame-content"><button aria-label="Open customer support" class="PylonChat-bubbleContainer" data-is-active="false" style="--chat-brand-color: #000000; --chat-background-color: light-dark(#000000, #000000); --contrast-color: oklch(from var(--chat-brand-color) clamp(0, (l / var(--l-threshold, 0.696) - 1) * -infinity, 1) min(c, 0.05) h);"><div data-is-showing="true"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><mask id="lineMask"><rect width="24" height="24" fill="white"></rect><path d="M7.52344 10.6014H11.5534M8.95644 8.27344H11.5534M7.70244 12.9304H11.5534" stroke="black" stroke-width="1.2" stroke-linecap="round"></path></mask></defs><g clip-path="url(#clip0_657_16797)"><path d="M12 17.5C15.3137 17.5 18 14.8137 18 11.5C18 8.18629 15.3137 5.5 12 5.5C8.68629 5.5 6 8.18629 6 11.5C6 14.8137 8.68629 17.5 12 17.5Z" fill="currentColor" mask="url(#lineMask)"></path><path d="M11.552 15.978H14.955V19.381L11.552 15.978Z" fill="currentColor" mask="url(#lineMask)"></path></g><defs><clippath id="clip0_657_16797"><rect width="24" height="24" fill="currentColor"></rect></clippath></defs></svg></div><div data-is-showing="false"><svg viewBox="0 0 46 47" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M30 20.5L23 27.5L16 20.5015" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></div></button></div></div></body></html>
